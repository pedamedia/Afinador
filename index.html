<!DOCTYPE html>
<html lang="es">
<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <title>Afinador</title>
  
  <!-- Favicons para navegadores y dispositivos -->
  <link rel="icon" type="image/png" sizes="16x16" href="logo-16.png">
  <link rel="icon" type="image/png" sizes="32x32" href="logo-32.png">
  <link rel="icon" type="image/png" sizes="48x48" href="logo-48.png">
  <link rel="apple-touch-icon" sizes="180x180" href="logo-180.png">
  
  <!-- PWA: manifest para instalación en Android/iOS/escritorio -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#1a1a1a">
  
  <style>
    /* ════════════════════════════════════════════════════════
       DESIGN TOKENS
       Variables globales de color, tamaño y espaciado.
       Cambiar aquí afecta toda la UI uniformemente.
    ════════════════════════════════════════════════════════ */
    :root {
      --bg:         #141414;
      --surface:    #1e1e1e;
      --surface-2:  #272727;
      --border:     #333;
      --accent:     #60aaff;
      --accent-dim: #1a3a5c;
      --text:       #e0e0e0;
      --text-muted: #666;
      --text-dim:   #999;
      --radius:     10px;
      --radius-sm:  6px;
      --gap:        8px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Courier New', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 1.2rem 1rem 2rem;
      gap: 1rem;
    }

    /* Texto que muestra la octava activa */
    .oct-display {
      font-size: 1rem;
      font-weight: 600;
      color: var(--accent);
      letter-spacing: 3px;
      text-transform: uppercase;
    }

    /* ════════════════════════════════════════════════════════
       BOTONES DE CONTROL (octava, layout, configuración)
    ════════════════════════════════════════════════════════ */
    .oct-controls {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .ctrl-btn {
      padding: 10px 18px;
      border-radius: var(--radius-sm);
      border: 0.5px solid var(--border);
      background: var(--surface);
      color: var(--text-dim);
      font-size: 13px;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.08s, color 0.08s, transform 0.06s, border-color 0.06s;
    }
    .ctrl-btn:hover    { background: var(--surface-2); color: var(--text); }
    .ctrl-btn.active   { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); transform: scale(0.94); }
    .ctrl-btn:disabled { opacity: 0.3; cursor: default; }

    /* ════════════════════════════════════════════════════════
       SLIDERS DE VOLUMEN POR OCTAVA
       5 celdas (Oct 2-6). La celda de la octava activa
       se resalta con el color de acento.
    ════════════════════════════════════════════════════════ */
    .vol-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: var(--gap);
      width: 100%;
      max-width: 520px;
    }

    .vol-cell {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      padding: 7px 5px;
      border-radius: var(--radius-sm);
      border: 0.5px solid var(--border);
      background: var(--surface);
      transition: border-color 0.1s, background 0.1s;
    }
    .vol-cell.active-oct {
      border-color: var(--accent);
      background: var(--accent-dim);
    }
    .vol-cell-label { font-size: 11px; color: var(--text-muted); }
    .vol-cell.active-oct .vol-cell-label { color: var(--accent); }
    .vol-cell-val   { font-size: 10px; color: var(--text-muted); }
    .vol-cell.active-oct .vol-cell-val   { color: var(--accent); }
    input[type=range] { width: 100%; accent-color: var(--accent); }

    /* Slider de volumen maestro (footer) */
    .vol-cell-master {
      width: 100%;
      max-width: 520px;
      padding: 10px 14px;
    }

    /* ════════════════════════════════════════════════════════
       GRILLA DE PADS
       flex-direction: column-reverse hace que Row 0
       (declarado primero en el JS, fila inferior del teclado)
       se renderice abajo visualmente, igual que un teclado físico.
    ════════════════════════════════════════════════════════ */
    .pad-grid {
      display: flex;
      flex-direction: column-reverse;
      gap: var(--gap);
      width: 100%;
      max-width: 520px;
    }

    .pad-row {
      display: grid;
      gap: var(--gap);
    }
    .pad-row[data-cols="4"] { grid-template-columns: repeat(4, 1fr); }
    .pad-row[data-cols="3"] { grid-template-columns: repeat(3, 1fr); }

    /* Pad individual: muestra nombre de nota, frecuencia y tecla asignada */
    .pad {
      border-radius: var(--radius);
      border: 0.5px solid var(--border);
      background: var(--surface);
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 14px 6px;
      gap: 5px;
      transition: background 0.06s, transform 0.06s, border-color 0.06s;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    .pad:hover  { background: var(--surface-2); }
    .pad.active { background: var(--accent-dim); border-color: var(--accent); transform: scale(0.94); }

    .pad-note { font-size: 13px; font-weight: 600; color: var(--text); line-height: 1; }
    .pad-freq { font-size: 10px; color: var(--text-muted); }
    .pad-key  {
      font-size: 10px;
      background: var(--surface-2);
      color: var(--text-muted);
      border-radius: 3px;
      padding: 1px 5px;
    }
    .pad.active .pad-note { color: var(--accent); }
    .pad.active .pad-key  { color: var(--accent); }

    /* Footer con volumen maestro y botones de layout/config */
    .footer {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }

    /* ════════════════════════════════════════════════════════
       MODAL DE CONFIGURACIÓN DE TECLAS (botón ⚙)
       Permite al usuario editar el keymap del layout activo.
       Se abre sobre la app con fondo semitransparente.
    ════════════════════════════════════════════════════════ */
    #configModal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }
    #configModal.open { display: flex; }

    .config-box {
      background: var(--surface);
      border: 0.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.2rem;
      width: 90%;
      max-width: 340px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .config-box textarea {
      background: var(--bg);
      color: var(--text);
      border: 0.5px solid var(--border);
      border-radius: var(--radius-sm);
      font-family: inherit;
      font-size: 12px;
      padding: 8px;
      height: 200px;
      resize: none;
    }

    /* Contador de caracteres — se vuelve rojo al acercarse al límite */
    .config-counter {
      font-size: 10px;
      color: var(--text-muted);
      text-align: right;
    }
    .config-counter.warning { color: #ff6b6b; }

    /* Mensaje de error de validación */
    .config-error {
      font-size: 11px;
      color: #ff6b6b;
      display: none;
    }
    .config-error.visible { display: block; }

    .config-actions {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
    }

    /* ════════════════════════════════════════════════════════
       BOTONES FLOTANTES EN LANDSCAPE MÓVIL
       Cuando el celular está girado (landscape) y la pantalla
       es angosta en altura, los botones Bajar/Subir octava
       aparecen fijos a los lados aprovechando el espacio vacío.
       No afecta portrait ni escritorio.
    ════════════════════════════════════════════════════════ */
    @media (orientation: landscape) and (max-height: 400px) and (min-width: 750px) {
      #btnDown, #btnUp {
        display: block;
        position: fixed;
        top: 50%;
        transform: translateY(-50%);
        z-index: 10;
        padding: 20px 14px;
        font-size: 13px;
      }
      #btnDown { left: 0; }
      #btnUp   { right: 0; }
    }
  </style>
</head>
<body>

<!-- Sliders de volumen por octava (construidos dinámicamente por JS) -->
<div class="vol-grid" id="volGrid"></div>

<!-- Indicador de octava activa -->
<div class="oct-display" id="octDisplay">Octava 3</div>

<!-- Botones de control de octava con chip de tecla asignada -->
<div class="oct-controls">
  <button class="ctrl-btn" id="btnDown">← Bajar<br><span class="pad-key" id="keyDown"></span></button>
  <button class="ctrl-btn" id="btnReset"><span id="resetLabel"></span><br><span class="pad-key" id="keyHome"></span></button>
  <button class="ctrl-btn" id="btnUp">Subir →<br><span class="pad-key" id="keyUp"></span></button>
</div>

<!-- Grilla de pads (construida dinámicamente por JS) -->
<div class="pad-grid" id="padGrid"></div>

<!-- Footer: volumen maestro, cambio de layout, configuración -->
<div class="footer">
  <div class="vol-cell vol-cell-master">
    <span class="vol-cell-label">🔊 Volumen</span>
    <input type="range" min="0" max="100" step="1" value="100" id="masterVolSlider">
    <span class="vol-cell-val" id="masterVolVal">100%</span>
  </div>
  <button class="ctrl-btn" id="btnLayout">⌨ QWERTY</button>
  <button class="ctrl-btn" id="btnConfig">⚙</button>
</div>

<!-- Modal de configuración de teclas -->
<div id="configModal">
  <div class="config-box">
    <span class="oct-display" style="font-size:0.85rem;" id="configTitle">Configuración de teclas</span>
    <textarea id="configText" maxlength="600"></textarea>
    <span class="config-counter" id="configCounter">0 / 600</span>
    <span class="config-error" id="configError"></span>
    <div class="config-actions">
      <button class="ctrl-btn" id="btnConfigCancel">Cancelar</button>
      <button class="ctrl-btn" id="btnConfigSave">Guardar</button>
    </div>
  </div>
</div>

<p style="font-size: 11px; color: var(--text-muted); margin-top: 0.5rem;">
  Creado por Ásdruel Jamz
</p>

<script>
"use strict";

// ════════════════════════════════════════════════════════════
// CONFIG GLOBAL
// Parámetros de comportamiento de la app. Editar aquí para
// ajustar sin tocar la lógica.
// ════════════════════════════════════════════════════════════
var CFG = {
  OCTAVE_MIN:     2,      // octava mínima disponible
  OCTAVE_MAX:     6,      // octava máxima disponible
  OCTAVE_DEFAULT: 3,      // octava al iniciar o resetear
  ATTACK_TIME:    0.03,   // segundos de fade-in al presionar una tecla
  RELEASE_TIME:   1.40,   // segundos de fade-out al soltar una tecla
  KEYMAP_MAX_LEN: 600,    // límite de caracteres en el modal de config
};

// Volumen base por octava. Las octavas bajas suenan más fuerte
// naturalmente; estos valores compensan la percepción.
// Ajustables en tiempo real con los sliders de la UI.
var OCTAVE_VOL = { 2: 1.00, 3: 0.75, 4: 0.50, 5: 0.25, 6: 0.15 };

// Volumen maestro global (0.0 a 1.0), controlado por el slider de footer
var _masterVol = 1.0;


// ════════════════════════════════════════════════════════════
// KEY LABELS
//
// Diccionario de e.code → etiqueta visual legible.
// Cumple tres roles:
//   1. Mostrar etiquetas legibles en los chips de los pads y botones.
//   2. Lista de códigos válidos para el validador del modal de config.
//   3. Referencia para el usuario al configurar teclas.
//
// Las letras sueltas (a-z) y dígitos (0-9) son válidos sin
// estar aquí — se validan por expresión regular en isValidCode().
//
// Separador de teclas múltiples para una misma nota: &
// Ejemplo en el keymap: Mi=Numpad4&4
// (tanto Numpad4 como 4 activarán la nota Mi)
// ════════════════════════════════════════════════════════════
var KEY_LABELS = {
  "Backspace":      "⌫",
  "Tab":            "Tab",
  "Space":          "Spc",
  "Alt":            "Alt",
  "Control":        "Ctrl",
  "NumLock":        "NL",
  "Numpad0":        "0",
  "Numpad1":        "1",
  "Numpad2":        "2",
  "Numpad3":        "3",
  "Numpad4":        "4",
  "Numpad5":        "5",
  "Numpad6":        "6",
  "Numpad7":        "7",
  "Numpad8":        "8",
  "Numpad9":        "9",
  "NumpadAdd":      "+",
  "NumpadSubtract": "-",
  "NumpadMultiply": "*",
  "NumpadDivide":   "/",
  "NumpadDecimal":  ".",
  "NumpadEnter":    "↵",
  "ArrowLeft":      "←",
  "ArrowRight":     "→",
  "ArrowUp":        "↑",
  "ArrowDown":      "↓",
};

// Convierte un e.code a su etiqueta visual.
// Si no está en el diccionario y es una sola letra, la pone en mayúscula.
function keyLabel(code) {
  if (KEY_LABELS[code]) return KEY_LABELS[code];
  if (code.length === 1) return code.toUpperCase();
  return code;
}

// Devuelve true si el código es una tecla reconocida.
// Acepta códigos del diccionario KEY_LABELS o letras/dígitos sueltos.
function isValidCode(code) {
  if (KEY_LABELS[code]) return true;
  if (/^[a-z0-9]$/.test(code)) return true;
  return false;
}


// ════════════════════════════════════════════════════════════
// KEYMAPS
//
// Mapeo NombreNota → CodigoTecla(s).
// Para asignar varias teclas a la misma nota, separarlas con &.
// Ejemplo: Mi=Numpad4&4
//
// Claves reservadas para controles de octava:
//   Oct-   → bajar octava
//   Oct+   → subir octava
//   OctRst → resetear octava al valor por defecto
//
// El usuario puede editar estos valores desde el modal ⚙.
// Los cambios se guardan en localStorage por layout y se
// restauran automáticamente al iniciar la app.
// ════════════════════════════════════════════════════════════
var KEYMAP_NUMPAD = {
  "Do":     "Numpad1",
  "Di":     "Numpad2",
  "Ra":     "Numpad3",
  "Ri":     "NumpadEnter",
  "Mi":     "Numpad4",
  "Fa":     "Numpad5",
  "Fi":     "Numpad6",
  "Go":     "NumpadAdd",
  "Gi":     "Numpad7",
  "La":     "Numpad8",
  "Li":     "Numpad9",
  "Si":     "NumpadSubtract",
  "Do'":    "NumLock",
  "Di'":    "NumpadDivide",
  "Ra'":    "NumpadMultiply",
  "Ri'":    "Backspace",
  "Oct-":   "Numpad0",
  "Oct+":   "NumpadDecimal",
  "OctRst": "Tab",
};

var KEYMAP_QWERTY = {
  "Do":     "c",
  "Di":     "v",
  "Ra":     "b",
  "Ri":     "n",
  "Mi":     "d",
  "Fa":     "f",
  "Fi":     "g",
  "Go":     "h",
  "Gi":     "e",
  "La":     "r",
  "Li":     "t",
  "Si":     "y",
  "Do'":    "3",
  "Di'":    "4",
  "Ra'":    "5",
  "Ri'":    "6",
  "Oct-":   "Alt",
  "Oct+":   "Space",
  "OctRst": "Control",
};

// Agrupa los keymaps por id de layout para acceso dinámico
var KEYMAPS = {
  numpad: KEYMAP_NUMPAD,
  qwerty: KEYMAP_QWERTY,
};


// ════════════════════════════════════════════════════════════
// LAYOUTS
//
// Define la estructura musical de cada modo de teclado.
// Los pads no tienen key — la tecla se resuelve desde el
// keymap activo en switchLayout(), desacoplando la estructura
// musical del mapeo de teclas.
//
// Campos de cada pad:
//   name      — clave interna, debe coincidir con el keymap
//   midi      — número MIDI base (Do central = 60, octava 4)
//   octOffset — 0 = octava activa, 1 = octava activa + 1
//   label     — (opcional) texto a mostrar en el pad;
//               si no existe, se muestra name
//
// octaveDown/Up/Home son arrays para soportar múltiples teclas
// por acción. Se actualizan desde el keymap en switchLayout()
// usando las claves reservadas Oct-/Oct+/OctRst.
//
// Las filas van de abajo (Row 0) hacia arriba (Row N).
// El CSS usa flex-direction:column-reverse para renderizarlas
// en el orden visual correcto, como un teclado físico.
// ════════════════════════════════════════════════════════════
var LAYOUTS = {

  numpad: {
    octaveDown: ["Numpad0"],
    octaveUp:   ["NumpadDecimal"],
    octaveHome: ["Tab"],
    keymap:     KEYMAP_NUMPAD,
    rows: [
      { cols: 4, pads: [
        { name: "Do",  midi: 60, octOffset: 0 },
        { name: "Di",  midi: 61, octOffset: 0, label: "Di = Re" },
        { name: "Ra",  midi: 62, octOffset: 0 },
        { name: "Ri",  midi: 63, octOffset: 0, label: "Ri = Me" },
      ]},
      { cols: 4, pads: [
        { name: "Mi",  midi: 64, octOffset: 0 },
        { name: "Fa",  midi: 65, octOffset: 0 },
        { name: "Fi",  midi: 66, octOffset: 0, label: "Fi = Ge" },
        { name: "Go",  midi: 67, octOffset: 0 },
      ]},
      { cols: 4, pads: [
        { name: "Gi",  midi: 68, octOffset: 0, label: "Gi = Le" },
        { name: "La",  midi: 69, octOffset: 0 },
        { name: "Li",  midi: 70, octOffset: 0, label: "Li = Se" },
        { name: "Si",  midi: 71, octOffset: 0 },
      ]},
      { cols: 4, pads: [
        { name: "Do'", midi: 60, octOffset: 1 },
        { name: "Di'", midi: 61, octOffset: 1 },
        { name: "Ra'", midi: 62, octOffset: 1 },
        { name: "Ri'", midi: 63, octOffset: 1 },
      ]},
    ],
  },

  qwerty: {
    octaveDown: ["Alt"],
    octaveUp:   ["Space"],
    octaveHome: ["Control"],
    keymap:     KEYMAP_QWERTY,
    rows: [
      { cols: 4, pads: [
        { name: "Do",  midi: 60, octOffset: 0 },
        { name: "Di",  midi: 61, octOffset: 0, label: "Di = Re" },
        { name: "Ra",  midi: 62, octOffset: 0 },
        { name: "Ri",  midi: 63, octOffset: 0, label: "Ri = Me" },
      ]},
      { cols: 4, pads: [
        { name: "Mi",  midi: 64, octOffset: 0 },
        { name: "Fa",  midi: 65, octOffset: 0 },
        { name: "Fi",  midi: 66, octOffset: 0, label: "Fi = Ge" },
        { name: "Go",  midi: 67, octOffset: 0 },
      ]},
      { cols: 4, pads: [
        { name: "Gi",  midi: 68, octOffset: 0, label: "Gi = Le" },
        { name: "La",  midi: 69, octOffset: 0 },
        { name: "Li",  midi: 70, octOffset: 0, label: "Li = Se" },
        { name: "Si",  midi: 71, octOffset: 0 },
      ]},
      { cols: 4, pads: [
        { name: "Do'", midi: 60, octOffset: 1 },
        { name: "Di'", midi: 61, octOffset: 1 },
        { name: "Ra'", midi: 62, octOffset: 1 },
        { name: "Ri'", midi: 63, octOffset: 1 },
      ]},
    ],
  },

};


// ════════════════════════════════════════════════════════════
// LAYOUT STATE
//
// ALL_PADS — lista plana de todos los pads del layout activo,
//            cada uno con su key resuelta desde el keymap.
// KEY_MAP  — { codigoTecla → pad } para detección O(1) en keydown.
//            Si una nota tiene múltiples teclas (Mi=Numpad4&4),
//            hay una entrada por cada tecla apuntando al mismo pad.
//
// Ambos se reconstruyen completamente en switchLayout().
// ════════════════════════════════════════════════════════════
var activeLayoutId = "";
var ALL_PADS       = [];
var KEY_MAP        = {};

function switchLayout(id) {
  releaseAllNotes();   // liberar notas antes de cambiar para evitar notas colgadas
  activeLayoutId = id;
  var layout = LAYOUTS[id];
  var keymap = layout.keymap;

  // Construir lista plana de pads con key resuelta desde el keymap
  ALL_PADS = layout.rows.reduce(function(acc, row) {
    return acc.concat(row.pads.map(function(pad) {
      return Object.assign({}, pad, { key: keymap[pad.name] });
    }));
  }, []);

  // Registrar una entrada en KEY_MAP por cada tecla del pad.
  // Si pad.key es "Numpad4&4", se crean dos entradas que
  // apuntan al mismo objeto pad.
  KEY_MAP = ALL_PADS.reduce(function(map, pad) {
    pad.key.split("&").forEach(function(k) {
      map[k.trim()] = pad;
    });
    return map;
  }, {});

  // Resolver teclas de control de octava desde el keymap como arrays.
  // Soporta múltiples teclas por acción (Oct-=Numpad0&ArrowDown).
  if (keymap["Oct-"])   layout.octaveDown = keymap["Oct-"].split("&").map(function(k){ return k.trim(); });
  if (keymap["Oct+"])   layout.octaveUp   = keymap["Oct+"].split("&").map(function(k){ return k.trim(); });
  if (keymap["OctRst"]) layout.octaveHome = keymap["OctRst"].split("&").map(function(k){ return k.trim(); });
}


// ════════════════════════════════════════════════════════════
// APP STATE
// ════════════════════════════════════════════════════════════
var State = {
  octave:  CFG.OCTAVE_DEFAULT,
  held:    {},     // { codigoTecla → true } teclas físicas actualmente presionadas
  octHeld: false,  // true mientras una tecla de octava está presionada,
                   // evita que el OS repita el evento keydown
};


// ════════════════════════════════════════════════════════════
// AUDIO ENGINE
//
// Módulo aislado con IIFE. Nadie fuera puede acceder a ctx,
// masterGain o active directamente.
//
// El AudioContext se crea lazy al primer gesto del usuario,
// cumpliendo la política de autoplay de Chrome/Safari.
//
// La ganancia maestra se ajusta dinámicamente con 1/√n
// donde n = notas activas, para evitar clipping cuando
// suenan varias notas al mismo tiempo.
//
// Wake Lock: mantiene la pantalla activa mientras se usa la app.
// Se solicita al crear el AudioContext y se reactiva
// automáticamente si la app vuelve al primer plano.
// ════════════════════════════════════════════════════════════
var Audio = (function() {
  var ctx        = null;
  var masterGain = null;
  var active     = {};   // { primaryKey → { osc, gainNode } }

  function getCtx() {
    if (!ctx) {
      ctx = new (window.AudioContext || window.webkitAudioContext)();
      masterGain = ctx.createGain();
      masterGain.gain.value = _masterVol;
      masterGain.connect(ctx.destination);
      _requestWakeLock();
    }
    return ctx;
  }

  var wakeLock = null;
  function _requestWakeLock() {
    if ("wakeLock" in navigator) {
      navigator.wakeLock.request("screen")
        .then(function(lock) { wakeLock = lock; })
        .catch(function() {});   // silencioso si el navegador no lo soporta
    }
  }
  // Reactivar Wake Lock cuando la app vuelve al primer plano
  document.addEventListener("visibilitychange", function() {
    if (document.visibilityState === "visible") _requestWakeLock();
  });

  function _updateMasterGain() {
    if (!masterGain) return;
    var n = Math.max(1, Object.keys(active).length);
    masterGain.gain.setTargetAtTime(_masterVol / Math.sqrt(n), ctx.currentTime, 0.008);
  }

  // Convierte número MIDI a frecuencia Hz
  function midiToFreq(midi) {
    var raw = 440 * Math.pow(2, (midi - 69) / 12);
    return Math.ceil(raw * 100) / 100;
  }

  // Calcula la frecuencia de un pad según la octava activa
  function freqForPad(pad, octave) {
    return midiToFreq(pad.midi + (octave + pad.octOffset - 4) * 12);
  }

  // Inicia una nota con fade-in suave. padKey es el identificador único.
  function start(padKey, freq, vol) {
    if (active[padKey]) return;   // ya está sonando
    var c = getCtx();
    var g = c.createGain();
    g.gain.setValueAtTime(0, c.currentTime);
    g.gain.linearRampToValueAtTime(vol * 0.7, c.currentTime + CFG.ATTACK_TIME);
    g.connect(masterGain);
    var osc = c.createOscillator();
    osc.type = "sine";
    osc.frequency.value = freq;
    osc.connect(g);
    osc.start();
    active[padKey] = { osc: osc, gainNode: g };
    _updateMasterGain();
  }

  // Detiene una nota con fade-out exponencial suave
  function stop(padKey) {
    var entry = active[padKey];
    if (!entry) return;
    var c = getCtx();
    entry.gainNode.gain.setValueAtTime(entry.gainNode.gain.value, c.currentTime);
    entry.gainNode.gain.exponentialRampToValueAtTime(0.0001, c.currentTime + CFG.RELEASE_TIME);
    entry.osc.stop(c.currentTime + CFG.RELEASE_TIME);
    delete active[padKey];
    _updateMasterGain();
  }

  // Detiene todas las notas activas (usado al cambiar layout)
  function stopAll() {
    Object.keys(active).forEach(stop);
  }

  return {
    start:        start,
    stop:         stop,
    stopAll:      stopAll,
    freqForPad:   freqForPad,
    setMasterVol: function(v) { _masterVol = v; _updateMasterGain(); },
  };

}());


// ════════════════════════════════════════════════════════════
// NOTE ACTIONS
//
// primaryKey — primera tecla del string (antes del primer &).
// Se usa como identificador único de la nota en el motor de
// audio, independiente de cuántas teclas tenga asignadas.
// ════════════════════════════════════════════════════════════

function playPad(pad) {
  var primaryKey = pad.key.split("&")[0].trim();
  var freq    = Audio.freqForPad(pad, State.octave);
  var realOct = Math.min(CFG.OCTAVE_MAX, State.octave + pad.octOffset);
  var vol     = OCTAVE_VOL[realOct] || OCTAVE_VOL[CFG.OCTAVE_MAX];
  Audio.start(primaryKey, freq, vol);
  setPadActive(pad, true);
}

function releasePad(pad) {
  var primaryKey = pad.key.split("&")[0].trim();
  Audio.stop(primaryKey);
  setPadActive(pad, false);
}

// Libera todas las notas y limpia el estado.
// Se llama al cambiar de layout o al abrir el modal de config.
function releaseAllNotes() {
  Object.keys(State.held).forEach(function(k) {
    var pad = KEY_MAP[k];
    if (pad) releasePad(pad);
  });
  State.held    = {};
  State.octHeld = false;
  Audio.stopAll();
}


// ════════════════════════════════════════════════════════════
// OCTAVE CONTROL
// ════════════════════════════════════════════════════════════

function setOctave(oct) {
  oct = Math.max(CFG.OCTAVE_MIN, Math.min(CFG.OCTAVE_MAX, oct));
  State.octave = oct;

  document.getElementById("octDisplay").textContent = "Octava " + oct;
  document.getElementById("resetLabel").textContent = "Oct " + CFG.OCTAVE_DEFAULT;
  document.getElementById("btnDown").disabled = oct === CFG.OCTAVE_MIN;
  document.getElementById("btnUp").disabled   = oct === CFG.OCTAVE_MAX;

  // Resaltar la celda del slider de la octava activa
  [2, 3, 4, 5, 6].forEach(function(o) {
    var cell = document.getElementById("volcell-" + o);
    if (cell) cell.classList.toggle("active-oct", o === oct);
  });

  updateFreqLabels();
}


// ════════════════════════════════════════════════════════════
// DOM HELPERS
// ════════════════════════════════════════════════════════════

// Actualiza las frecuencias mostradas en todos los pads
function updateFreqLabels() {
  ALL_PADS.forEach(function(pad) {
    var el = document.getElementById("freq-" + pad.key);
    if (el) el.textContent = Audio.freqForPad(pad, State.octave) + " Hz";
  });
}

// Activa o desactiva el estado visual de un pad (color de acento)
function setPadActive(pad, on) {
  var el = document.getElementById("pad-" + pad.key);
  if (el) el.classList.toggle("active", on);
}

// Actualiza los chips de tecla en los botones de octava.
// Muestra solo la primera tecla de cada acción.
function updateOctaveButtonTitles(layoutId) {
  var lay = LAYOUTS[layoutId];
  document.getElementById("keyDown").textContent = keyLabel(lay.octaveDown[0]);
  document.getElementById("keyUp").textContent   = keyLabel(lay.octaveUp[0]);
  document.getElementById("keyHome").textContent = keyLabel(lay.octaveHome[0]);
}

// Devuelve true si el modal de configuración está abierto.
// Se usa para desactivar el teclado musical mientras se edita.
function isModalOpen() {
  return document.getElementById("configModal").classList.contains("open");
}


// ════════════════════════════════════════════════════════════
// KEYBOARD HANDLER
//
// normalizeKey() traduce el evento crudo del navegador a un
// identificador consistente usado en KEY_MAP y los layouts.
//
// Para el numpad usa e.code, que es independiente del estado
// de NumLock (Numpad4 siempre es Numpad4, no "4" o "ArrowLeft").
// Para las demás teclas usa e.key en minúscula.
//
// Cuando el modal está abierto, el handler retorna sin hacer
// nada, dejando el teclado libre para escribir en el textarea.
// ════════════════════════════════════════════════════════════

function normalizeKey(e) {
  if (e.code === "Space")   return "Space";
  if (e.code === "Tab")     return "Tab";
  if (e.key  === "Alt")     return "Alt";
  if (e.key  === "Control") return "Control";
  if (e.code === "NumLock" || e.code.startsWith("Numpad")) return e.code;
  if (e.code === "Backspace") return "Backspace";
  if (e.code.startsWith("Arrow")) return e.code;
  return e.key.toLowerCase();
}

document.addEventListener("keydown", function(e) {
  if (e.repeat)      { e.preventDefault(); return; }
  if (isModalOpen()) { return; }

  var k   = normalizeKey(e);
  var lay = LAYOUTS[activeLayoutId];

  // Controles de octava — usan .includes() porque octaveDown/Up/Home son arrays
  if (lay.octaveDown.includes(k)) { e.preventDefault(); if (!State.octHeld) { State.octHeld = true; setOctave(State.octave - 1); flashBtn("btnDown");  } return; }
  if (lay.octaveUp.includes(k))   { e.preventDefault(); if (!State.octHeld) { State.octHeld = true; setOctave(State.octave + 1); flashBtn("btnUp");    } return; }
  if (lay.octaveHome.includes(k)) { e.preventDefault(); if (!State.octHeld) { State.octHeld = true; setOctave(CFG.OCTAVE_DEFAULT); flashBtn("btnReset"); } return; }

  // Disparar nota
  var pad = KEY_MAP[k];
  if (pad && !State.held[k]) {
    e.preventDefault();
    State.held[k] = true;
    playPad(pad);
  }
});

document.addEventListener("keyup", function(e) {
  if (isModalOpen()) { return; }

  var k   = normalizeKey(e);
  var lay = LAYOUTS[activeLayoutId];

  // Liberar lock de octava
  if (lay.octaveDown.includes(k) || lay.octaveUp.includes(k) || lay.octaveHome.includes(k)) {
    State.octHeld = false;
    return;
  }

  // Soltar nota
  if (State.held[k]) {
    delete State.held[k];
    var pad = KEY_MAP[k];
    if (pad) releasePad(pad);
  }
});


// ════════════════════════════════════════════════════════════
// BUILD UI — Sliders de volumen por octava
// Se construye una sola vez al cargar la página.
// ════════════════════════════════════════════════════════════

(function buildVolGrid() {
  var grid = document.getElementById("volGrid");
  [2, 3, 4, 5, 6].forEach(function(oct) {
    var pct  = Math.round(OCTAVE_VOL[oct] * 100);
    var cell = document.createElement("div");
    cell.className = "vol-cell";
    cell.id = "volcell-" + oct;
    cell.innerHTML =
      '<span class="vol-cell-label">Oct ' + oct + '</span>' +
      '<input type="range" min="0" max="100" step="1" value="' + pct + '">' +
      '<span class="vol-cell-val" id="volval-' + oct + '">' + pct + '%</span>';
    cell.querySelector("input").addEventListener("input", function(e) {
      var v = parseInt(e.target.value, 10);
      OCTAVE_VOL[oct] = v / 100;
      document.getElementById("volval-" + oct).textContent = v + "%";
    });
    grid.appendChild(cell);
  });
}());


// ════════════════════════════════════════════════════════════
// BUILD UI — Grilla de pads
// Se reconstruye cada vez que cambia el layout o el keymap.
// ════════════════════════════════════════════════════════════

function buildPadGrid() {
  var grid = document.getElementById("padGrid");
  grid.innerHTML = "";

  LAYOUTS[activeLayoutId].rows.forEach(function(rowDef) {
    var rowEl = document.createElement("div");
    rowEl.className = "pad-row";
    rowEl.dataset.cols = rowDef.cols;

    rowDef.pads.forEach(function(pad) {
      // Resolver el pad usando la primera tecla del keymap
      var firstKey    = LAYOUTS[activeLayoutId].keymap[pad.name].split("&")[0].trim();
      var resolvedPad = KEY_MAP[firstKey];
      if (!resolvedPad) return;

      var el = document.createElement("div");
      el.className = "pad";
      el.id = "pad-" + resolvedPad.key;

      el.innerHTML =
        // label es el texto visible; name es la clave interna
        '<span class="pad-note">' + (resolvedPad.label || resolvedPad.name) + '</span>' +
        '<span class="pad-freq" id="freq-' + resolvedPad.key + '">-- Hz</span>' +
        // El chip muestra solo la primera tecla asignada
        '<span class="pad-key">' + keyLabel(resolvedPad.key.split("&")[0].trim()) + '</span>';

      // Mouse events
      el.addEventListener("mousedown",  function(e) { e.preventDefault(); playPad(resolvedPad); el._held = true; });
      el.addEventListener("mouseup",    function()  { releasePad(resolvedPad); el._held = false; });
      el.addEventListener("mouseleave", function()  { if (el._held) { releasePad(resolvedPad); el._held = false; } });
      // Touch events
      el.addEventListener("touchstart", function(e) { e.preventDefault(); playPad(resolvedPad); });
      el.addEventListener("touchend",   function(e) { e.preventDefault(); releasePad(resolvedPad); });

      rowEl.appendChild(el);
    });

    grid.appendChild(rowEl);
  });

  updateFreqLabels();
}


// ════════════════════════════════════════════════════════════
// BUTTON EVENTS
//
// bindBtn resuelve el problema de doble disparo en móvil:
// touchstart ejecuta la acción y marca handled=true; el click
// sintético que el navegador genera después se ignora.
// Todos los botones usan este mismo patrón para consistencia.
// ════════════════════════════════════════════════════════════

function flashBtn(id) {
  var el = document.getElementById(id);
  el.classList.add("active");
  setTimeout(function() { el.classList.remove("active"); }, 150);
}

function bindBtn(id, action) {
  var el      = document.getElementById(id);
  var handled = false;
  el.addEventListener("touchstart", function(e) {
    e.preventDefault();
    handled = true;
    flashBtn(id);
    action();
  }, { passive: false });
  el.addEventListener("click", function() {
    if (handled) { handled = false; return; }
    flashBtn(id);
    action();
  });
}

bindBtn("btnDown",  function() { setOctave(State.octave - 1); });
bindBtn("btnUp",    function() { setOctave(State.octave + 1); });
bindBtn("btnReset", function() { setOctave(CFG.OCTAVE_DEFAULT); });

bindBtn("btnLayout", function() {
  var nextId = activeLayoutId === "numpad" ? "qwerty" : "numpad";
  switchLayout(nextId);
  buildPadGrid();
  updateOctaveButtonTitles(nextId);
  // El botón muestra el layout al que se cambiará en el próximo click
  document.getElementById("btnLayout").textContent =
    "⌨ " + (nextId === "numpad" ? "QWERTY" : "Numérico");
});

document.getElementById("masterVolSlider").addEventListener("input", function() {
  var v = parseInt(this.value, 10);
  document.getElementById("masterVolVal").textContent = v + "%";
  Audio.setMasterVol(v / 100);
});


// ════════════════════════════════════════════════════════════
// CONFIG MODAL
//
// Permite editar el keymap del layout activo desde la app.
// El textarea siempre muestra la configuración actual lista
// para editar — nunca está vacío.
//
// Validaciones al guardar (en orden):
//   1. Líneas malformadas (sin = o valor vacío)
//   2. Nombres de nota desconocidos (no existen en el keymap)
//   3. Nombres duplicados (misma nota dos veces)
//   4. Códigos de tecla no reconocidos
//   5. Teclas duplicadas entre notas distintas
//
// Si cualquier validación falla, se muestra el error en rojo
// y no se aplica ningún cambio.
//
// Los cambios válidos se guardan en localStorage y se aplican
// inmediatamente sin recargar la app.
//
// Formato del texto de configuración:
//   NombreNota=CodigoTecla
//   Do=Numpad1
//   Mi=Numpad4&4     ← dos teclas para la misma nota
//   Oct-=Numpad0
// ════════════════════════════════════════════════════════════

// Convierte el objeto keymap a texto plano para mostrar en el textarea
function keymapToText(keymap) {
  return Object.keys(keymap).map(function(name) {
    return name + "=" + keymap[name];
  }).join("\n");
}

// Parsea el texto del textarea en { map, warnings }.
// map      — objeto { nombre → teclas } con las entradas válidas
// warnings — array de strings describiendo líneas malformadas
// Usa indexOf("=") para encontrar solo el primer = de cada línea,
// permitiendo que el valor contenga = si fuera necesario.
// Ignora líneas vacías y espacios extra — el usuario puede
// organizar el texto libremente con saltos de línea.
function textToKeymap(text) {
  var map      = {};
  var warnings = [];
  text.trim().split("\n").forEach(function(line) {
    line = line.trim();
    if (!line) return;   // ignorar líneas vacías
    var idx = line.indexOf("=");
    if (idx === -1) {
      warnings.push(line + " (falta el =)");
      return;
    }
    var name  = line.slice(0, idx).trim();
    var value = line.slice(idx + 1).trim();
    if (!value) {
      warnings.push(name + " (valor vacío)");
      return;
    }
    if (name) map[name] = value;
  });
  return { map: map, warnings: warnings };
}

function showConfigError(msg) {
  var el = document.getElementById("configError");
  el.textContent = msg;
  el.classList.add("visible");
}

function clearConfigError() {
  var el = document.getElementById("configError");
  el.textContent = "";
  el.classList.remove("visible");
}

function updateConfigCounter(len) {
  var counter = document.getElementById("configCounter");
  counter.textContent = len + " / " + CFG.KEYMAP_MAX_LEN;
  // Avisar visualmente cuando se acerca al límite (90%)
  counter.classList.toggle("warning", len >= CFG.KEYMAP_MAX_LEN * 0.9);
}

function openConfigModal() {
  var saved = localStorage.getItem("keymap_" + activeLayoutId);
  document.getElementById("configTitle").textContent =
    "Teclas " + (activeLayoutId === "numpad" ? "Numérico" : "QWERTY");
  var text = saved || keymapToText(KEYMAPS[activeLayoutId]);
  document.getElementById("configText").value = text;
  updateConfigCounter(text.length);
  clearConfigError();
  releaseAllNotes();   // liberar notas antes de abrir
  document.getElementById("configModal").classList.add("open");
}

function closeConfigModal() {
  document.getElementById("configModal").classList.remove("open");
}

function saveConfig() {
  var text   = document.getElementById("configText").value;
  var result = textToKeymap(text);
  var newMap = result.map;

  // 1. Líneas malformadas
  if (result.warnings.length > 0) {
    showConfigError("Líneas ignoradas: " + result.warnings.join(", "));
    return;
  }

  // 2. Nombres de nota desconocidos
  var validNames = Object.keys(KEYMAPS[activeLayoutId]);
  var unknown = Object.keys(newMap).filter(function(name) {
    return validNames.indexOf(name) === -1;
  });
  if (unknown.length > 0) {
    showConfigError("Nombres desconocidos: " + unknown.join(", "));
    return;
  }

  // 3. Nombres duplicados (misma nota aparece dos veces en el texto)
  var nameSeen  = {};
  var dupNames  = [];
  text.trim().split("\n").forEach(function(line) {
    line = line.trim();
    if (!line) return;
    var idx = line.indexOf("=");
    if (idx === -1) return;
    var name = line.slice(0, idx).trim();
    if (!name) return;
    if (nameSeen[name]) {
      dupNames.push(name);
    } else {
      nameSeen[name] = true;
    }
  });
  if (dupNames.length > 0) {
    showConfigError("Notas duplicadas: " + dupNames.join(", "));
    return;
  }

  // 4. Nombres de nota faltantes (todas las notas del keymap deben estar presentes)
  var missing = validNames.filter(function(name) {
    return !(name in newMap);
  });
  if (missing.length > 0) {
    showConfigError("Notas faltantes: " + missing.join(", "));
    return;
  }

  // 5. Códigos de tecla no reconocidos
  var invalid = Object.keys(newMap).filter(function(name) {
    return newMap[name].split("&").some(function(k) {
      return !isValidCode(k.trim());
    });
  });
  if (invalid.length > 0) {
    showConfigError("Códigos no reconocidos: " +
      invalid.map(function(n) { return n + "=" + newMap[n]; }).join(", "));
    return;
  }

  // 6. Teclas duplicadas entre notas distintas
  var keySeen    = {};
  var dupKeys    = [];
  Object.keys(newMap).forEach(function(name) {
    newMap[name].split("&").forEach(function(k) {
      k = k.trim();
      if (keySeen[k]) {
        dupKeys.push(k + " en " + keySeen[k] + " y " + name);
      } else {
        keySeen[k] = name;
      }
    });
  });
  if (dupKeys.length > 0) {
    showConfigError("Teclas duplicadas: " + dupKeys.join(", "));
    return;
  }

  // Todo válido — aplicar y guardar
  Object.assign(KEYMAPS[activeLayoutId], newMap);
  try {
    localStorage.setItem("keymap_" + activeLayoutId, text);
  } catch(e) {
    showConfigError("Error al guardar: almacenamiento lleno.");
    return;
  }
  switchLayout(activeLayoutId);
  buildPadGrid();
  updateOctaveButtonTitles(activeLayoutId);
  updateFreqLabels();
  closeConfigModal();
}

// Al iniciar, restaurar keymaps guardados en localStorage.
// Solo sobreescribe las entradas presentes — las demás quedan
// con sus valores por defecto del código.
function applyStoredKeymaps() {
  ["numpad", "qwerty"].forEach(function(id) {
    var saved = localStorage.getItem("keymap_" + id);
    if (saved) Object.assign(KEYMAPS[id], textToKeymap(saved).map);
  });
}

bindBtn("btnConfig", openConfigModal);
document.getElementById("btnConfigCancel").addEventListener("click", closeConfigModal);
document.getElementById("btnConfigSave").addEventListener("click", saveConfig);
// Cerrar modal al hacer click en el fondo semitransparente
document.getElementById("configModal").addEventListener("click", function(e) {
  if (e.target === this) closeConfigModal();
});
// Contador de caracteres en tiempo real
document.getElementById("configText").addEventListener("input", function() {
  updateConfigCounter(this.value.length);
});


// ════════════════════════════════════════════════════════════
// INIT
// Orden importante: primero aplicar keymaps guardados,
// luego construir el layout, luego la UI.
// ════════════════════════════════════════════════════════════
applyStoredKeymaps();
switchLayout("numpad");
buildPadGrid();
setOctave(CFG.OCTAVE_DEFAULT);
updateOctaveButtonTitles("numpad");
document.getElementById("masterVolSlider").value = 100;

// PWA: registrar Service Worker para funcionamiento offline
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("sw.js").catch(function() {});
}
