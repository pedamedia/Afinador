<!DOCTYPE html>
<html lang="es">
<head>
  <link rel="manifest" href="manifest.json">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Afinador Ásdruel</title>
  <style>
    /* ════════════════════════════════════════════════════════
       DESIGN TOKENS
       Cambia aquí los colores/tamaños globales.
    ════════════════════════════════════════════════════════ */
    :root {
      --bg:         #141414;
      --surface:    #1e1e1e;
      --surface-2:  #272727;
      --border:     #333;
      --accent:     #60aaff;
      --accent-dim: #1a3a5c;
      --text:       #e0e0e0;
      --text-muted: #666;
      --text-dim:   #999;
      --radius:     10px;
      --radius-sm:  6px;
      --gap:        8px;
    }

    /* ════════════════════════════════════════════════════════
       RESET
    ════════════════════════════════════════════════════════ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Courier New', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 1.2rem 1rem 2rem;
      gap: 1rem;
    }

    /* ════════════════════════════════════════════════════════
       OCTAVE DISPLAY
    ════════════════════════════════════════════════════════ */
    .oct-display {
      font-size: 1rem;
      font-weight: 600;
      color: var(--accent);
      letter-spacing: 3px;
      text-transform: uppercase;
    }

    /* ════════════════════════════════════════════════════════
       CONTROL BUTTONS (octave up/down/reset, layout toggle)
    ════════════════════════════════════════════════════════ */
    .oct-controls {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .ctrl-btn {
      padding: 6px 12px;
      border-radius: var(--radius-sm);
      border: 0.5px solid var(--border);
      background: var(--surface);
      color: var(--text-dim);
      font-size: 11px;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.08s, color 0.08s, transform 0.06s, border-color 0.06s;
    }
    .ctrl-btn:hover    { background: var(--surface-2); color: var(--text); }
    .ctrl-btn.active   { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); transform: scale(0.94); }
    .ctrl-btn:disabled { opacity: 0.3; cursor: default; }

    /* ════════════════════════════════════════════════════════
       VOLUME GRID
       5 cells, one per octave, with a range slider each.
    ════════════════════════════════════════════════════════ */
    .vol-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: var(--gap);
      width: 100%;
      max-width: 520px;
    }

    .vol-cell {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      padding: 7px 5px;
      border-radius: var(--radius-sm);
      border: 0.5px solid var(--border);
      background: var(--surface);
      transition: border-color 0.1s, background 0.1s;
    }
    .vol-cell.active-oct {
      border-color: var(--accent);
      background: var(--accent-dim);
    }
    .vol-cell-label { font-size: 11px; color: var(--text-muted); }
    .vol-cell.active-oct .vol-cell-label { color: var(--accent); }
    .vol-cell-val   { font-size: 10px; color: var(--text-muted); }
    .vol-cell.active-oct .vol-cell-val   { color: var(--accent); }
    input[type=range] { width: 100%; accent-color: var(--accent); }

    /* ════════════════════════════════════════════════════════
       PAD GRID
       flex-direction: column-reverse hace que PAD_ROWS[0]
       (fila inferior en los datos) se renderice abajo
       visualmente, coincidiendo con el teclado físico.
    ════════════════════════════════════════════════════════ */
    .pad-grid {
      display: flex;
      flex-direction: column-reverse;
      gap: var(--gap);
      width: 100%;
      max-width: 520px;
    }

    .pad-row {
      display: grid;
      gap: var(--gap);
    }
    .pad-row[data-cols="4"] { grid-template-columns: repeat(4, 1fr); }
    .pad-row[data-cols="3"] { grid-template-columns: repeat(3, 1fr); }

    /* ════════════════════════════════════════════════════════
       INDIVIDUAL PAD
    ════════════════════════════════════════════════════════ */
    .pad {
      border-radius: var(--radius);
      border: 0.5px solid var(--border);
      background: var(--surface);
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 14px 6px;
      gap: 5px;
      transition: background 0.06s, transform 0.06s, border-color 0.06s;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    .pad:hover  { background: var(--surface-2); }
    .pad.active {
      background: var(--accent-dim);
      border-color: var(--accent);
      transform: scale(0.94);
    }

    .pad-note { font-size: 13px; font-weight: 600; color: var(--text); line-height: 1; }
    .pad-freq { font-size: 10px; color: var(--text-muted); }
    .pad-key  {
      font-size: 10px;
      background: var(--surface-2);
      color: var(--text-muted);
      border-radius: 3px;
      padding: 1px 5px;
    }
    .pad.active .pad-note { color: var(--accent); }
    .pad.active .pad-key  { color: var(--accent); }

    /* ════════════════════════════════════════════════════════
       FOOTER
    ════════════════════════════════════════════════════════ */
    .footer {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }
  </style>
</head>
<body>

<!-- ── OCTAVE DISPLAY ──────────────────────────────────── -->
<div class="oct-display" id="octDisplay">Octava 3</div>

<!-- ── OCTAVE CONTROLS ────────────────────────────────── -->
<div class="oct-controls">
  <button class="ctrl-btn" id="btnDown">← bajar<br><span class="pad-key" id="keyDown"></span></button>
  <button class="ctrl-btn" id="btnReset"><span id="resetLabel"></span><br><span class="pad-key" id="keyHome"></span></button>
  <button class="ctrl-btn" id="btnUp">subir →<br><span class="pad-key" id="keyUp"></span></button>
</div>

<!-- ── VOLUME SLIDERS ────────────────────────────────── -->
<div class="vol-grid" id="volGrid"></div>

<!-- ── PAD GRID ──────────────────────────────────────── -->
<div class="pad-grid" id="padGrid"></div>

<!-- ── FOOTER ────────────────────────────────────────── -->
<div class="footer">
  <!--
    El botón muestra el layout al que VAS A CAMBIAR,
    no el que está activo. Arranca en numérico → muestra QWERTY.
  -->
  <button class="ctrl-btn" id="btnLayout">⌨ QWERTY</button>
</div>

<script>
"use strict";

// ════════════════════════════════════════════════════════════
// CONFIG
// Parámetros globales. Editar aquí para ajustar comportamiento
// sin tocar lógica.
// ════════════════════════════════════════════════════════════
var CFG = {
  OCTAVE_MIN:     2,
  OCTAVE_MAX:     6,
  OCTAVE_DEFAULT: 3,
  ATTACK_TIME:    0.03,   // segundos de fade-in al presionar
  RELEASE_TIME:   1.40,   // segundos de fade-out al soltar
};

// Volumen base por octava (ajustable con los sliders).
// Las octavas bajas suenan más fuerte naturalmente, se compensan
// aquí para equilibrar la percepción.
var OCTAVE_VOL = { 2: 1.00, 3: 0.75, 4: 0.50, 5: 0.25, 6: 0.15 };


// ════════════════════════════════════════════════════════════
// LAYOUT DEFINITIONS
//
// Cada layout define:
//   rows       — filas de pads, declaradas de abajo hacia arriba
//   octaveDown/Up/Home — teclas de control de octava
//
// Cada pad define:
//   name      — nombre visual
//   midi      — número MIDI base (C4 = 60, en octava 4)
//   octOffset — desplazamiento de octava (0 = actual, 1 = actual+1)
//   key       — tecla normalizada que lo dispara
//
// Las filas van de Row 0 (inferior) a Row N (superior).
// El CSS usa flex-direction:column-reverse para renderizarlas
// en orden correcto sin invertir el array.
//
// ── NUMPAD ──────────────────────────────────────────────────
//   [ /=Do+1 ][ *=Do#+1 ][ ⌫=Re+1 ]
//   [ 7=Sol# ][ 8=La    ][ 9=La#  ][ -=Si  ]
//   [ 4=Mi   ][ 5=Fa    ][ 6=Fa#  ][ +=Sol ]
//   [ 1=Do   ][ 2=Do#   ][ 3=Re   ][ ↵=Re# ]
//
// ── QWERTY ──────────────────────────────────────────────────
//   [ 3=Do+1 ][ 4=Do#+1 ][ 5=Re+1 ][ 6=Re#+1]
//   [ e=Sol# ][ r=La    ][ t=La#  ][ y=Si  ]
//   [ d=Mi   ][ f=Fa    ][ g=Fa#  ][ h=Sol ]
//   [ c=Do   ][ v=Do#   ][ b=Re   ][ n=Re# ]
// ════════════════════════════════════════════════════════════
var LAYOUTS = {

  numpad: {
    octaveDown: "0",
    octaveUp:   ".",
    octaveHome: "tab",
    rows: [
      // Row 0 — fila inferior
      { cols: 4, pads: [
        { name: "Do",         midi: 60, octOffset: 0, key: "1"         },
        { name: "#Do / bRe",  midi: 61, octOffset: 0, key: "2"         },
        { name: "Re",         midi: 62, octOffset: 0, key: "3"         },
        { name: "#Re / bMi",  midi: 63, octOffset: 0, key: "enter"     },
      ]},
      // Row 1
      { cols: 4, pads: [
        { name: "Mi",         midi: 64, octOffset: 0, key: "4"         },
        { name: "Fa",         midi: 65, octOffset: 0, key: "5"         },
        { name: "#Fa / bSol", midi: 66, octOffset: 0, key: "6"         },
        { name: "Sol",        midi: 67, octOffset: 0, key: "+"         },
      ]},
      // Row 2
      { cols: 4, pads: [
        { name: "#Sol / bLa", midi: 68, octOffset: 0, key: "7"         },
        { name: "La",         midi: 69, octOffset: 0, key: "8"         },
        { name: "#La / bSi",  midi: 70, octOffset: 0, key: "9"         },
        { name: "Si",         midi: 71, octOffset: 0, key: "-"         },
      ]},
      // Row 3 — fila superior (octava + 1)
      { cols: 4, pads: [
        { name: "Do'",         midi: 60, octOffset: 1, key: "numlock"         },
        { name: "#Do' / bRe'", midi: 61, octOffset: 1, key: "/"         },
        { name: "Re'",         midi: 62, octOffset: 1, key: "*"  },
        { name: "#Re' / bMi'", midi: 63, octOffset: 1, key: "backspace"  },
      ]},
    ],
  },

  qwerty: {
    octaveDown: "alt",
    octaveUp:   "space",
    octaveHome: "ctrl",
    rows: [
      // Row 0 — fila inferior
      { cols: 4, pads: [
        { name: "Do",         midi: 60, octOffset: 0, key: "c"         },
        { name: "#Do / bRe",  midi: 61, octOffset: 0, key: "v"         },
        { name: "Re",         midi: 62, octOffset: 0, key: "b"         },
        { name: "#Re / bMi",  midi: 63, octOffset: 0, key: "n"         },
      ]},
      // Row 1
      { cols: 4, pads: [
        { name: "Mi",         midi: 64, octOffset: 0, key: "d"         },
        { name: "Fa",         midi: 65, octOffset: 0, key: "f"         },
        { name: "#Fa / bSol", midi: 66, octOffset: 0, key: "g"         },
        { name: "Sol",        midi: 67, octOffset: 0, key: "h"         },
      ]},
      // Row 2
      { cols: 4, pads: [
        { name: "#Sol / bLa", midi: 68, octOffset: 0, key: "e"         },
        { name: "La",         midi: 69, octOffset: 0, key: "r"         },
        { name: "#La / bSi",  midi: 70, octOffset: 0, key: "t"         },
        { name: "Si",         midi: 71, octOffset: 0, key: "y"         },
      ]},
      // Row 3 — fila superior (octava + 1)
      { cols: 4, pads: [
        { name: "Do'",         midi: 60, octOffset: 1, key: "3"         },
        { name: "#Do' / bRe'", midi: 61, octOffset: 1, key: "4"         },
        { name: "Re'",         midi: 62, octOffset: 1, key: "5"         },
        { name: "#Re' / bMi'", midi: 63, octOffset: 1, key: "6"         },
      ]},
    ],
  },

};


// ════════════════════════════════════════════════════════════
// LAYOUT STATE
//
// ALL_PADS y KEY_MAP se derivan siempre del layout activo.
// switchLayout() es el ÚNICO punto donde se actualizan los
// tres juntos, garantizando consistencia total.
// ════════════════════════════════════════════════════════════
var activeLayoutId = "";
var ALL_PADS       = [];   // lista plana de pads del layout activo
var KEY_MAP        = {};   // { normalizedKey → pad }

/**
 * Cambia el layout activo y recalcula ALL_PADS y KEY_MAP.
 * Libera notas activas antes de cambiar para evitar notas colgadas.
 * @param {string} id — clave de LAYOUTS ("numpad" | "qwerty")
 */
function switchLayout(id) {
  releaseAllNotes();
  activeLayoutId = id;

  ALL_PADS = LAYOUTS[id].rows.reduce(function(acc, row) {
    return acc.concat(row.pads);
  }, []);

  KEY_MAP = ALL_PADS.reduce(function(map, pad) {
    map[pad.key.toLowerCase()] = pad;
    return map;
  }, {});
}


// ════════════════════════════════════════════════════════════
// APP STATE
// ════════════════════════════════════════════════════════════
var State = {
  octave: CFG.OCTAVE_DEFAULT,
  held:   {},   // { normalizedKey → true } — teclas físicas presionadas
};


// ════════════════════════════════════════════════════════════
// AUDIO ENGINE
//
// Módulo aislado. Para reemplazar el motor (ej: WebMIDI o
// samples) solo hay que reimplementar start(), stop(), stopAll().
// ════════════════════════════════════════════════════════════
var Audio = (function() {
  var ctx        = null;
  var masterGain = null;
  var active     = {};   // { padKey → { osc, gainNode } }

  // Crea el AudioContext la primera vez que se necesita.
  // Los navegadores exigen que sea tras un gesto del usuario.
  function getCtx() {
    if (!ctx) {
      ctx = new (window.AudioContext || window.webkitAudioContext)();
      masterGain = ctx.createGain();
      masterGain.gain.value = 1.0;
      masterGain.connect(ctx.destination);
      _requestWakeLock();
    }
    return ctx;
  }

  // ── Wake Lock ────────────────────────────────────────────
  // Evita que la pantalla se apague mientras se usa la app.
  // Se solicita al crear el AudioContext (primer toque) y se
  // reactiva automáticamente si la app vuelve al primer plano.
  var wakeLock = null;
  function _requestWakeLock() {
    if ("wakeLock" in navigator) {
      navigator.wakeLock.request("screen")
        .then(function(lock) { wakeLock = lock; })
        .catch(function() {});
    }
  }
  document.addEventListener("visibilitychange", function() {
    if (document.visibilityState === "visible") _requestWakeLock();
  });

  // Ajusta el gain maestro según cuántas notas suenan al mismo
  // tiempo, para evitar distorsión por clipping.
  function _updateMasterGain() {
    if (!masterGain) return;
    var n = Math.max(1, Object.keys(active).length);
    masterGain.gain.setTargetAtTime(1 / Math.sqrt(n), ctx.currentTime, 0.008);
  }

  // Convierte número MIDI a frecuencia Hz.
  function midiToFreq(midi) {
    var raw = 440 * Math.pow(2, (midi - 69) / 12);
    return Math.ceil(raw * 100) / 100;
  }

  // Calcula la frecuencia de un pad dado el octave actual.
  function freqForPad(pad, octave) {
    var shift = (octave + pad.octOffset - 4) * 12;
    return midiToFreq(pad.midi + shift);
  }

  // Inicia una nota. padKey identifica la nota activa.
  function start(padKey, freq, vol) {
    if (active[padKey]) return;   // ya está sonando
    var c = getCtx();
    var g = c.createGain();
    g.gain.setValueAtTime(0, c.currentTime);
    g.gain.linearRampToValueAtTime(vol * 0.7, c.currentTime + CFG.ATTACK_TIME);
    g.connect(masterGain);
    var osc = c.createOscillator();
    osc.type = "sine";
    osc.frequency.value = freq;
    osc.connect(g);
    osc.start();
    active[padKey] = { osc: osc, gainNode: g };
    _updateMasterGain();
  }

  // Detiene una nota con fade-out suave.
  function stop(padKey) {
    var entry = active[padKey];
    if (!entry) return;
    var c = getCtx();
    entry.gainNode.gain.setValueAtTime(entry.gainNode.gain.value, c.currentTime);
    entry.gainNode.gain.exponentialRampToValueAtTime(0.0001, c.currentTime + CFG.RELEASE_TIME);
    entry.osc.stop(c.currentTime + CFG.RELEASE_TIME);
    delete active[padKey];
    _updateMasterGain();
  }

  // Detiene todas las notas activas (usado al cambiar layout).
  function stopAll() {
    Object.keys(active).forEach(stop);
  }

  return { start: start, stop: stop, stopAll: stopAll, freqForPad: freqForPad };
}());


// ════════════════════════════════════════════════════════════
// NOTE ACTIONS
// ════════════════════════════════════════════════════════════

function playPad(pad) {
  var freq    = Audio.freqForPad(pad, State.octave);
  var realOct = Math.min(CFG.OCTAVE_MAX, State.octave + pad.octOffset);
  var vol     = OCTAVE_VOL[realOct] || OCTAVE_VOL[CFG.OCTAVE_MAX];
  Audio.start(pad.key, freq, vol);
  setPadActive(pad, true);
}

function releasePad(pad) {
  Audio.stop(pad.key);
  setPadActive(pad, false);
}

// Libera todas las notas y limpia State.held.
// Se llama al cambiar de layout o al reiniciar.
function releaseAllNotes() {
  Object.keys(State.held).forEach(function(k) {
    var pad = KEY_MAP[k];
    if (pad) releasePad(pad);
  });
  State.held = {};
  Audio.stopAll();
}


// ════════════════════════════════════════════════════════════
// OCTAVE CONTROL
// ════════════════════════════════════════════════════════════

function setOctave(oct) {
  oct = Math.max(CFG.OCTAVE_MIN, Math.min(CFG.OCTAVE_MAX, oct));
  State.octave = oct;

  document.getElementById("octDisplay").textContent = "Octava " + oct;
  document.getElementById("resetLabel").textContent = "Oct " + CFG.OCTAVE_DEFAULT;
  document.getElementById("btnDown").disabled = oct === CFG.OCTAVE_MIN;
  document.getElementById("btnUp").disabled   = oct === CFG.OCTAVE_MAX;

  // Resaltar celda de volumen de la octava activa
  [2, 3, 4, 5, 6].forEach(function(o) {
    var cell = document.getElementById("volcell-" + o);
    if (cell) cell.classList.toggle("active-oct", o === oct);
  });

  updateFreqLabels();
}


// ════════════════════════════════════════════════════════════
// DOM HELPERS
// ════════════════════════════════════════════════════════════

// Actualiza frecuencias de todos los pads del layout activo.
// Siempre usa ALL_PADS (sincronizado con switchLayout).
function updateFreqLabels() {
  ALL_PADS.forEach(function(pad) {
    var el = document.getElementById("freq-" + pad.key);
    if (el) el.textContent = Audio.freqForPad(pad, State.octave) + " Hz";
  });
}

function setPadActive(pad, on) {
  var el = document.getElementById("pad-" + pad.key);
  if (el) el.classList.toggle("active", on);
}

// Convierte la key interna a etiqueta visual legible.
function keyLabel(key) {
  if (key === "backspace") return "⌫";
  if (key === "enter")     return "↵";
  return key.toUpperCase();
}

// Actualiza los chips de tecla de los botones de octava según el layout activo.
function updateOctaveButtonTitles(layoutId) {
  var lay = LAYOUTS[layoutId];
  document.getElementById("keyDown").textContent = lay.octaveDown.toUpperCase();
  document.getElementById("keyUp").textContent   = lay.octaveUp.toUpperCase();
  document.getElementById("keyHome").textContent = lay.octaveHome.toUpperCase();
}


// ════════════════════════════════════════════════════════════
// BUILD UI — Volume sliders
// Se construye una sola vez al cargar.
// ════════════════════════════════════════════════════════════
(function buildVolGrid() {
  var grid = document.getElementById("volGrid");
  [2, 3, 4, 5, 6].forEach(function(oct) {
    var pct  = Math.round(OCTAVE_VOL[oct] * 100);
    var cell = document.createElement("div");
    cell.className = "vol-cell";
    cell.id = "volcell-" + oct;
    cell.innerHTML =
      '<span class="vol-cell-label">Oct ' + oct + '</span>' +
      '<input type="range" min="0" max="100" step="1" value="' + pct + '">' +
      '<span class="vol-cell-val" id="volval-' + oct + '">' + pct + '%</span>';
    cell.querySelector("input").addEventListener("input", function(e) {
      var v = parseInt(e.target.value, 10);
      OCTAVE_VOL[oct] = v / 100;
      document.getElementById("volval-" + oct).textContent = v + "%";
    });
    grid.appendChild(cell);
  });
}());


// ════════════════════════════════════════════════════════════
// BUILD UI — Pad grid
// Se llama cada vez que cambia el layout (switchLayout → buildPadGrid).
// ════════════════════════════════════════════════════════════
function buildPadGrid() {
  var grid = document.getElementById("padGrid");
  grid.innerHTML = "";   // limpiar layout anterior

  LAYOUTS[activeLayoutId].rows.forEach(function(rowDef) {
    var rowEl = document.createElement("div");
    rowEl.className = "pad-row";
    rowEl.dataset.cols = rowDef.cols;

    rowDef.pads.forEach(function(pad) {
      var el = document.createElement("div");
      el.className = "pad";
      el.id = "pad-" + pad.key;

      el.innerHTML =
        '<span class="pad-note">' + pad.name + '</span>' +
        '<span class="pad-freq" id="freq-' + pad.key + '">-- Hz</span>' +
        '<span class="pad-key">' + keyLabel(pad.key) + '</span>';

      // Mouse
      el.addEventListener("mousedown",  function(e) { e.preventDefault(); playPad(pad); el._held = true; });
      el.addEventListener("mouseup",    function()  { releasePad(pad); el._held = false; });
      el.addEventListener("mouseleave", function()  { if (el._held) { releasePad(pad); el._held = false; } });

      // Touch
      el.addEventListener("touchstart", function(e) { e.preventDefault(); playPad(pad); });
      el.addEventListener("touchend",   function(e) { e.preventDefault(); releasePad(pad); });

      rowEl.appendChild(el);
    });

    grid.appendChild(rowEl);
  });

  // Sincronizar etiquetas de frecuencia con la octava activa
  updateFreqLabels();
}


// ════════════════════════════════════════════════════════════
// KEYBOARD HANDLER
// ════════════════════════════════════════════════════════════

// Normaliza e.key a los identificadores usados en los layouts.
function normalizeKey(e) {
  var k = e.key;
  if (k === "Enter")     return "enter";
  if (k === "Backspace") return "backspace";
  if (k === "Tab")       return "tab";
  if (k === "Alt")       return "alt";
  if (k === " ")         return "space";
  if (k === "Control")   return "ctrl";

  //{"key":"NumLock","code":"NumLock","keyCode":144}
  if (k === "NumLock" || e.code === "NumLock") return "numlock";
  
  //if (k === "LaunchCalculator" || k === "LaunchApplication2" || e.code === "LaunchApp2") return "tab";
  //if (k === "LaunchMail" || e.code === "LaunchMail") return "tab";

  if (e.code === "NumpadDecimal") return ".";
  if (e.code === "Numpad0") return "0";
  if (e.code === "Numpad1") return "1";
  if (e.code === "Numpad2") return "2";
  if (e.code === "Numpad3") return "3";
  if (e.code === "Numpad4") return "4";
  if (e.code === "Numpad5") return "5";
  if (e.code === "Numpad6") return "6";
  if (e.code === "Numpad7") return "7";
  if (e.code === "Numpad8") return "8";
  if (e.code === "Numpad9") return "9";
  
  return k.toLowerCase();
}

document.addEventListener("keydown", function(e) {
  
  //if (e.key === "LaunchCalculator" || e.key === "LaunchApplication2"){ e.preventDefault();}
  //if (e.key === "LaunchMail" ){ e.preventDefault();}  
  
  if (e.repeat){ 
    e.preventDefault();
    return;
  }
  
  var k   = normalizeKey(e);
  var lay = LAYOUTS[activeLayoutId];

  // ── Controles de octava (específicos por layout) ─────────
  if (k === lay.octaveDown) { e.preventDefault(); setOctave(State.octave - 1);   flashBtn("btnDown");   return; }
  if (k === lay.octaveUp)   { e.preventDefault(); setOctave(State.octave + 1);   flashBtn("btnUp");     return; }
  if (k === lay.octaveHome) { e.preventDefault(); setOctave(CFG.OCTAVE_DEFAULT); flashBtn("btnReset");  return; }

  // ── Disparar nota ────────────────────────────────────────
  var pad = KEY_MAP[k];
  if (pad && !State.held[k]) {
    e.preventDefault();
    State.held[k] = true;
    playPad(pad);
  }
});

document.addEventListener("keyup", function(e) {
  var k = normalizeKey(e);
  var lay = LAYOUTS[activeLayoutId];
  if (State.held[k]) {
    delete State.held[k];
    var pad = KEY_MAP[k];
    if (pad) releasePad(pad);
  }
});


// ════════════════════════════════════════════════════════════
// BUTTON EVENTS
// ════════════════════════════════════════════════════════════

function flashBtn(id) {
  var el = document.getElementById(id);
  el.classList.add("active");
  setTimeout(function() { el.classList.remove("active"); }, 150);
}

["btnDown", "btnUp", "btnReset"].forEach(function(id) {
  var el = document.getElementById(id);
  el.addEventListener("mousedown",  function() { el.classList.add("active"); });
  el.addEventListener("mouseup",    function() { el.classList.remove("active"); });
  el.addEventListener("mouseleave", function() { el.classList.remove("active"); });
  el.addEventListener("touchstart", function(e) { e.preventDefault(); el.classList.add("active"); });
  el.addEventListener("touchend",   function(e) { e.preventDefault(); el.classList.remove("active"); });
});

document.getElementById("btnDown").addEventListener("click", function() {
  setOctave(State.octave - 1);
});
document.getElementById("btnUp").addEventListener("click", function() {
  setOctave(State.octave + 1);
});
document.getElementById("btnReset").addEventListener("click", function() {
  setOctave(CFG.OCTAVE_DEFAULT);
});

document.getElementById("btnLayout").addEventListener("click", function() {
  // Alternar entre los dos layouts
  var nextId = activeLayoutId === "numpad" ? "qwerty" : "numpad";

  switchLayout(nextId);
  buildPadGrid();
  updateOctaveButtonTitles(nextId);

  // El botón siempre muestra el layout al que se CAMBIARÁ en el próximo click
  var oppositeId = nextId === "numpad" ? "qwerty" : "numpad";
  this.textContent = "⌨ " + (oppositeId === "numpad" ? "Numérico" : "QWERTY");
});


// ════════════════════════════════════════════════════════════
// INIT
// Siempre arranca en modo numérico.
// ════════════════════════════════════════════════════════════
switchLayout("numpad");
buildPadGrid();
setOctave(CFG.OCTAVE_DEFAULT);
updateOctaveButtonTitles("numpad");

// Service Worker para funcionamiento offline e instalación en Android
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("sw.js").catch(function() {});
}
</script>
